<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IRB 생명윤리 퀴즈 마스터</title>
    <style>
        :root {
            --primary-color: #4A90E2;
            --success-color: #2ECC71;
            --danger-color: #E74C3C;
            --bg-color: #F5F7FA;
            --card-bg: #FFFFFF;
            --text-color: #333333;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        #quiz-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        #header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 1rem;
            font-weight: bold;
            color: var(--primary-color);
        }
        #card {
            background-color: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.06);
            padding: 30px 20px;
            text-align: center;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 25px;
            word-break: keep-all;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .ox-btn {
            flex: 1;
            padding: 25px 0;
            font-size: 2.5rem;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        #btn-o { background-color: var(--primary-color); }
        #btn-x { background-color: var(--danger-color); }
        
        #feedback {
            display: none;
            flex-direction: column;
            align-items: center;
        }
        #result-text {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .correct { color: var(--success-color); }
        .incorrect { color: var(--danger-color); }
        
        #explanation {
            background-color: #EBF5FB;
            padding: 15px;
            border-radius: 10px;
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 20px;
            width: 100%;
            box-sizing: border-box;
            text-align: left;
            border-left: 5px solid var(--primary-color);
        }
        .action-btn {
            width: 100%;
            padding: 18px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            background-color: var(--text-color);
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        #completion {
            display: none;
            text-align: center;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="header">
        <span>IRB 실전 퀴즈</span>
        <span id="counter">남은 문제: -</span>
    </div>

    <div id="card">질문을 불러오는 중입니다...</div>

    <div class="btn-group" id="ox-buttons">
        <button class="ox-btn" id="btn-o" onclick="checkAnswer('O')">O</button>
        <button class="ox-btn" id="btn-x" onclick="checkAnswer('X')">X</button>
    </div>

    <div id="feedback">
        <div id="result-text"></div>
        <div id="explanation"></div>
        <button class="action-btn" onclick="nextQuestion()">다음 문제</button>
    </div>

    <div id="completion">
        <h1 style="color:var(--success-color)">🎓 학습 완료!</h1>
        <p>42개 전 문항을 마스터하셨습니다.<br>시험 합격을 기원합니다!</p>
        <button class="action-btn" onclick="startQuiz()">다시 시작하기</button>
    </div>
</div>

<script>
    const questions = [
        // --- 1. 심의 범위 및 법률 (1~13) ---
        { q: '“대학생의 휴대폰 사용과 심리적 스트레스간의 관계에 대한 설문 조사연구”는 생명윤리법에 적용된다.', a: 'O', exp: '인간 대상 연구이므로 법적 적용 및 심의 대상입니다.' },
        { q: '“휴대폰 전자파에 노출된 대학생의 혈액을 채취하여 유전자를 분석하는 연구”는 생명윤리법에 적용된다.', a: 'O', exp: '인체유래물 연구에 해당하므로 법적 적용 대상입니다.' },
        { q: '“혈액채취를 하지 않지만 개인식별정보가 있는 연구”는 IRB 심의를 받아야 한다.', a: 'O', exp: '개인정보가 포함된 인간 대상 연구는 원칙적으로 심의 대상입니다.' },
        { q: '설문조사 연구인 경우 IRB 심의를 받을 필요가 없다.', a: 'X', exp: '설문조사도 인간 대상 연구이므로 심의 대상입니다. (면제 여부는 IRB가 결정)' },
        { q: '국민건강영양조사와 같이 개인식별정보가 제거된 자료를 이차분석하는 경우 심의를 받을 필요가 없다.', a: 'X', exp: '공공데이터 분석이라도 IRB의 \'심의 면제 확인\' 절차를 반드시 거쳐야 합니다.' },
        { q: '인체유래물은행에서 받은 검체로 연구하는 경우 심의를 받을 필요가 없다.', a: 'X', exp: '인체유래물 연구로서 심의 또는 면제 확인 절차가 필요합니다.' },
        { q: '선배가 조사한 설문 결과를 분석하는 2차 연구인 경우 심의를 받을 필요가 없다.', a: 'X', exp: '기존 자료의 2차 활용도 연구 목적이 변경되었으므로 심의 대상입니다.' },
        { q: '예비조사(pilot study)는 본 연구에 활용되는 경우에도 심의를 받을 필요가 없다.', a: 'X', exp: '인간 대상 예비조사 역시 IRB 심의를 받아야 합니다.' },
        { q: '생명윤리위원회 심의면제에 대한 판단은 연구자의 몫이다.', a: 'X', exp: '심의면제 여부는 오직 IRB 위원회만 결정할 수 있습니다.' },
        { q: '“기관생명윤리위원회(IRB)”는 연구자를 보호하는 데 설립 목적이 있다.', a: 'X', exp: 'IRB의 최우선 목적은 \'연구대상자\'의 권리와 안전 보호입니다.' },
        { q: '1964년 세계의사회가 제정한 인간 대상 의학연구 윤리 원칙은 벨몬트 보고서이다.', a: 'X', exp: '1964년 제정된 것은 헬싱키 선언입니다. (벨몬트는 1979년)' },
        { q: '벨몬트 보고서의 윤리원칙 중 동의 획득의 근거가 되는 원칙은 인간존중이다.', a: 'O', exp: '인간존중(자율성 존중)이 자발적 동의서 획득의 근거입니다.' },
        { q: '동일한 연구에 참여하는 연구대상자가 직면하는 위험은 모두 동일하다.', a: 'X', exp: '개별 대상자의 건강상태, 연령 등에 따라 체감 위험은 다릅니다.' },

        // --- 2. 개인정보 및 관리 (14~17, 32) ---
        { q: '연구대상자의 이름은 개인식별정보이다.', a: 'O', exp: '이름은 특정 개인을 알아볼 수 있는 직접적인 식별정보입니다.' },
        { q: '연구대상자의 연령은 개인식별정보이다.', a: 'X', exp: '나이(연령)만으로는 특정 개인을 식별할 수 없습니다.' },
        { q: '연구대상자의 전화번호는 개인식별정보이다.', a: 'O', exp: '전화번호는 개인을 특정할 수 있는 정보입니다.' },
        { q: '연구대상자의 생년월일은 개인식별정보이다.', a: 'O', exp: '생년월일은 다른 정보와 결합하여 식별 가능성이 높은 정보로 간주합니다.' },
        { q: '생명윤리위원회의 승인통보서는 받은 후 3년간 보관한다.', a: 'X', exp: '중요 오류: 승인 시점이 아니라, [연구 종료 후] 3년간 보관해야 합니다.' },

        // --- 3. 연구 계획 및 변경 (18~23, 29~31) ---
        { q: 'IRB에 제출하는 계획서는 학위청구논문계획서와 동일하다.', a: 'X', exp: 'IRB 계획서는 대상자 보호와 윤리에 특화된 별도의 서식입니다.' },
        { q: 'IRB에서는 연구계획서의 윤리적 타당성만을 검토한다.', a: 'X', exp: '윤리뿐만 아니라 과학적 타당성(설계 등)도 함께 검토합니다.' },
        { q: '계획서 내용을 변경하는 경우 연구 종료 후 변경사항을 IRB에 보고한다.', a: 'X', exp: '변경 적용 [전]에 반드시 사전 승인을 받아야 합니다.' },
        { q: '연구계획서 외에 자료수집도구(설문지 등)도 심의대상이 된다.', a: 'O', exp: '대상자에게 제공되는 모든 자료가 심의 대상입니다.' },
        { q: '심의 신청 시 연구책임자의 연구윤리 교육이수증이 필요하다.', a: 'O', exp: '책임자의 교육 이수는 필수 신청 요건입니다.' },
        { q: '심의 신청 시 공동연구자의 연구윤리 교육이수증이 필요하다.', a: 'O', exp: '모든 연구담당자의 교육 이수증이 필요합니다.' },
        { q: '연구책임자의 전화번호가 변경된 경우에도 변경심의를 해야 한다.', a: 'O', exp: '사소한 연락처 변경도 동의서 수정 사유이므로 보고 대상입니다.' },
        { q: '연구가 종료된 경우 IRB에 종료 심의(보고)를 요청한다.', a: 'O', exp: '종료 후에는 종료보고를 통해 위원회의 확인을 받아야 합니다.' },
        { q: '연구 진행 중 1년이 경과한 경우에는 지속심의를 받아야 한다.', a: 'O', exp: '통상 1년 단위로 연구 진행 상황을 보고해야 합니다.' },

        // --- 4. 모집 및 보상 (24~28, 41) ---
        { q: '연구대상자 모집문건에는 연구 중재가 매우 효과적임을 강조한다.', a: 'X', exp: '효과를 과장하는 것은 부당한 유인이 될 수 있어 금지됩니다.' },
        { q: '연구대상자 모집문건에는 참여에 따른 구체적인 보상액수를 기술한다.', a: 'X', exp: '중요 오류: 구체적 액수는 [동의서]에만 적어야 하며, 광고(모집문건)에 기재 시 부당한 유인이 됩니다.' },
        { q: '연구대상자 모집문건에는 참여에 따른 기대되는 이익을 기술할 수 있다.', a: 'O', exp: '예상되는 이익과 위험을 균형 있게 기술해야 합니다.' },
        { q: '연구대상자에게는 가능한 교통비를 많이 지불하도록 한다.', a: 'X', exp: '과도한 보상은 자발적 참여를 방해하는 부당한 유인이 됩니다.' },
        { q: '학위논문 계획서 심사 시 지도교수가 심의 위원으로 참여한다.', a: 'X', exp: '이해상충에 해당하므로 해당 심의에서 제외(제척)되어야 합니다.' },
        { q: '보상은 중도 탈락 방지를 위해 종료 시점에 전액 일괄 지급한다.', a: 'X', exp: '참여 정도에 따라 분할 지급하는 것이 윤리적입니다.' },

        // --- 5. 심화 및 예상 (33~40, 42) ---
        { q: '취약한 연구대상자를 포함하는 연구는 심의를 면제받을 수 있다.', a: 'X', exp: '취약 대상자 연구는 면제 대상이 될 수 없습니다.' },
        { q: '설명문에는 전혀 예견할 수 없는 부작용 발생 가능성도 명시해야 한다.', a: 'O', exp: '미지의 위험 가능성도 고지해야 합니다.' },
        { q: '중대한 이상반응 발생 시 정기 지속심의 때 일괄 보고하면 된다.', a: 'X', exp: '중대 이상반응은 지체 없이 [즉시] 보고해야 합니다.' },
        { q: '대상자가 동의를 철회한 경우 수집된 데이터는 폐기하는 것이 원칙이다.', a: 'O', exp: '철회 시 데이터 파기 절차를 동의서에 명시해야 합니다.' },
        { q: '후원기관이 자사 제품에 유리한 결과 수정을 요구하는 상황은 이해상충이다.', a: 'O', exp: '재정적 이해관계가 연구 객관성을 해치는 전형적 사례입니다.' },
        { q: '공개된 장소에서의 단순 관찰 연구는 식별 불가 시 면제될 수 있다.', a: 'O', exp: '사생활 침해 위험이 낮은 연구는 확인 후 면제 가능합니다.' },
        { q: '기만(Deception) 연구는 어떠한 경우에도 IRB 승인을 받을 수 없다.', a: 'X', exp: '과학적 필요성이 크고 사후 설명 절차가 있다면 예외적 승인이 가능합니다.' },
        { q: '데이터 USB 저장 시 암호화하거나 잠금장치가 있는 곳에 보관해야 한다.', a: 'O', exp: '물리적/전자적 보안은 필수 점검 항목입니다.' },
        { q: '과학계 위원은 위험이 이득보다 크더라도 가치가 높으면 승인해야 한다.', a: 'X', exp: '아무리 가치가 커도 위험이 최소화되지 않으면 승인할 수 없습니다.' }
    ];

    let queue = [];
    let currentIdx = 0;

    function startQuiz() {
        queue = [...questions];
        shuffle(queue);
        document.getElementById('completion').classList.add('hidden');
        document.getElementById('header').classList.remove('hidden');
        document.getElementById('card').classList.remove('hidden');
        document.getElementById('ox-buttons').classList.remove('hidden');
        showQuestion();
    }

    function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
    }

    function showQuestion() {
        if (queue.length === 0) {
            document.getElementById('header').classList.add('hidden');
            document.getElementById('card').classList.add('hidden');
            document.getElementById('ox-buttons').classList.add('hidden');
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('completion').style.display = 'flex';
            return;
        }
        const item = queue[0];
        document.getElementById('card').innerText = item.q;
        document.getElementById('counter').innerText = `남은 문제: ${queue.length}개`;
        document.getElementById('ox-buttons').style.display = 'flex';
        document.getElementById('feedback').style.display = 'none';
    }

    function checkAnswer(userAns) {
        const item = queue[0];
        const isCorrect = userAns === item.a;
        const feedback = document.getElementById('feedback');
        const resText = document.getElementById('result-text');
        const expText = document.getElementById('explanation');
        
        document.getElementById('ox-buttons').style.display = 'none';
        
        if (isCorrect) {
            resText.innerText = "⭕ 정답입니다!";
            resText.className = "correct";
            queue.shift();
        } else {
            resText.innerText = `❌ 오답입니다! (정답: ${item.a})`;
            resText.className = "incorrect";
            queue.push(queue.shift());
        }
        
        expText.innerText = item.exp;
        feedback.style.display = 'flex';
    }

    function nextQuestion() {
        showQuestion();
    }

    window.onload = startQuiz;
</script>

</body>
</html>
